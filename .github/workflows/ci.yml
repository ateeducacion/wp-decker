---
name: CI

on:
  pull_request:
  push:
    tags:
      - '*'
    branches:
      - '*' 

permissions:
  contents: read

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@v6

      # Note: the WordPress Playground PR preview link is posted by the dedicated
      # playground-preview.yml workflow (WordPress/action-wp-playground-pr-preview).

      # - name: Pre-pull Docker images
      #   run: |
      #     docker pull mariadb:lts
      #     docker pull wordpress
      #     docker pull wordpress:cli

      - name: PHP setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'  # Adjust the version according to your needs
          extensions: mbstring, intl, curl, dom, json, pdo, mysql, xml, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install gettext
        run: sudo apt-get install -y gettext

      - name: Check untranslated strings
        run: make check-untranslated

      # Install wp-env globally
      - name: Setup wp-env
        run: npm -g --no-fund i @wordpress/env

      # Start wp-env environment
      - name: Start wp-env
        run: make up

      - name: Run code linting
        run: make lint

      - name: Run plugin check
        run: make check-plugin

      - name: Run unit tests
        run: make test

      # E2E Tests with Playwright
      - name: Install npm dependencies and Playwright
        run: npm install && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: make test-e2e
        env:
          CI: true
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: artifacts/
          retention-days: 7
